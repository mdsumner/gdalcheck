name: Check CRAN for updates

on:
  schedule:
    - cron: '0 6 * * *'  # 6am UTC daily
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      needs_rebuild: ${{ steps.check.outputs.needs_rebuild }}
      changed_packages: ${{ steps.check.outputs.changed_packages }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install dependencies
        run: |
          install.packages("jsonlite")
        shell: Rscript {0}

      - name: Check for CRAN updates
        id: check
        run: Rscript scripts/R/check_cran_updates.R

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/cran_state.json config/revdep_manifest.csv
          git diff --staged --quiet || git commit -m "Update CRAN state [skip ci]"
          git push

      - name: Trigger cache rebuild
        if: steps.check.outputs.needs_rebuild == 'true'
        run: |
          gh workflow run rebuild-cache.yml \
            -f changed_packages="${{ steps.check.outputs.changed_packages }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
