name: Rebuild binary cache

on:
  workflow_dispatch:
    inputs:
      changed_packages:
        description: 'Packages that triggered rebuild'
        required: false
        default: 'manual trigger'
      no_cache:
        description: 'Disable Docker layer cache (force full rebuild)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
  workflow_call:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/gdalcheck

jobs:
  build-cache:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          df -h

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install pkgdepends
        run: install.packages("pkgdepends")
        shell: Rscript {0}

      - name: Generate system requirements
        run: Rscript scripts/R/generate_sysreqs.R config/sysreqs.txt ubuntu-24.04

      - name: Get GDAL version from gdal-r-full
        id: gdal-version
        run: |
          VERSION=$(docker run --rm ghcr.io/hypertidy/gdal-r-full:latest \
            gdal-config --version)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "GDAL version: ${VERSION}"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.base
          push: true
          no-cache: ${{ inputs.no_cache == 'true' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-base:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-base:gdal-${{ steps.gdal-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build binary cache
        run: |
          mkdir -p cache-out

          docker run --rm \
            -v ${{ github.workspace }}/config:/config:ro \
            -v ${{ github.workspace }}/scripts/R:/scripts:ro \
            -v ${{ github.workspace }}/cache-out:/output \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-base:latest \
            Rscript /scripts/build_binary_cache.R /output 6

          echo "=== Layer summary ==="
          cat cache-out/layer_manifest.csv
          echo ""
          echo "=== Directory sizes ==="
          du -sh cache-out/layer* || true

      - name: Generate Dockerfile
        run: |
          chmod +x scripts/generate_dockerfile.sh
          ./scripts/generate_dockerfile.sh cache-out docker/Dockerfile.cached

          echo "=== Generated Dockerfile ==="
          cat docker/Dockerfile.cached

      - name: Build cached image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.cached
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:gdal-${{ steps.gdal-version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-base:latest

      - name: Commit manifests
        run: |
          mkdir -p manifests
          cp cache-out/test_manifest.csv manifests/
          cp cache-out/layer_manifest.csv manifests/
          cp cache-out/package_manifest.csv manifests/
          cp cache-out/build_summary.json manifests/
          cp config/sysreqs.txt manifests/
          cp config/sysreqs_list.txt manifests/ || true
          [ -f cache-out/failed_packages.txt ] && \
            cp cache-out/failed_packages.txt manifests/ || true

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Add everything that changed
          git add -A
          git diff --staged --quiet || git commit -m "Update cache manifests [skip ci]"

          # Pull with rebase, autostash handles any edge cases
          git pull --rebase --autostash origin main
          git push

      - name: Summary
        run: |
          {
            echo "## Cache rebuild complete"
            echo ""
            echo "**Base image:** \`ghcr.io/hypertidy/gdal-r-full:latest\`"
            echo "**GDAL version:** ${{ steps.gdal-version.outputs.version }}"
            echo "**Triggered by:** ${{ inputs.changed_packages || 'manual' }}"
            echo ""
            echo "### System requirements (additional, beyond gdal-r-full)"
            echo '```'
            cat config/sysreqs.txt
            echo '```'
            echo ""
            echo "### Layers"
            echo '```'
            cat cache-out/layer_manifest.csv
            echo '```'
            echo ""
            echo "**Test manifest:** $(wc -l < cache-out/test_manifest.csv) packages"
            echo ""
            echo "**Cached image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -f cache-out/failed_packages.txt ]; then
            {
              echo ""
              echo "### Failed packages"
              echo '```'
              cat cache-out/failed_packages.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
